{% extends "base.html" %}
{% block title %}Yeni Reçete{% endblock %}
{% block page_title %}Yeni Reçete{% endblock %}
{% block breadcrumb %}<a href="/dashboard">Dashboard</a> / <a href="/recete/">Reçeteler</a> / Yeni{% endblock %}
{% block content %}
<form method="POST" action="/recete/kaydet" id="formRecete">
<div class="row g-3">
  <div class="col-lg-5">
    <div class="card h-100">
      <div class="card-header"><i class="bi bi-info-circle me-2"></i>Reçete Bilgileri</div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:12px">
        <div><label class="form-label">Reçete Adı *</label><input type="text" name="ad" class="form-control" placeholder="Temel Kurabiye Hamuru" required></div>
        <div><label class="form-label">Tip *</label>
          <select name="tip" class="form-select" id="selTip">
            {% for t in ReceteTip %}<option value="{{ t.value }}">{{ t.value }} — {% if t.value=='hammadde' %}Direkt hammaddeden ürün{% elif t.value=='karisim' %}Ara ürün (hamur, krema, sos){% else %}Hem hammadde hem ara ürün{% endif %}</option>{% endfor %}
          </select>
        </div>
        <div><label class="form-label">Bağlı Ürün <small style="color:var(--muted)">(final ürün için)</small></label>
          <select name="urun_id" class="form-select"><option value="">— Opsiyonel —</option>{% for u in urunler %}<option value="{{ u.id }}">{{ u.ad }}</option>{% endfor %}</select>
        </div>
        <div class="divider"></div>
        <div style="font-size:12px;font-weight:600;color:var(--muted)">BAZ BİRİM — "1 ??? için bu kalemler"</div>
        <div class="row g-2">
          <div class="col-5"><label class="form-label">Baz Miktar</label><input type="number" name="baz_miktar" class="form-control" value="1" step="0.001" min="0.001"></div>
          <div class="col-4"><label class="form-label">Baz Birim</label>
            <select name="baz_birim" class="form-select">{% for b in birimler %}<option value="{{ b }}">{{ b }}</option>{% endfor %}</select>
          </div>
          <div class="col-3"><label class="form-label">= kaç kg?</label><input type="number" name="baz_kg_karsiligi" class="form-control" step="0.0001" placeholder="1.8"></div>
        </div>
        <div><label class="form-label">Notlar</label><textarea name="notlar" class="form-control" rows="2"></textarea></div>
      </div>
    </div>
  </div>

  <div class="col-lg-7">
    <div class="card">
      <div class="card-header d-flex justify-content-between">
        <span><i class="bi bi-list-ul me-2"></i>Reçete Kalemleri</span>
        <button type="button" class="btn-tw" style="font-size:12px;padding:4px 10px" onclick="kalemEkle()">+ Kalem Ekle</button>
      </div>
      <div class="card-body p-0" id="kalemler">
        <!-- Dinamik satırlar JS ile eklenir -->
      </div>
      <div style="padding:12px 16px;border-top:1px solid var(--border)">
        <button type="button" class="btn-ghost w-100" onclick="kalemEkle()"><i class="bi bi-plus me-1"></i> Kalem Ekle</button>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:16px;display:flex;justify-content:flex-end;gap:10px">
  <a href="/recete/" class="btn-ghost">İptal</a>
  <button type="submit" class="btn-tw" style="font-size:14px;padding:9px 24px">Reçeteyi Kaydet</button>
</div>
</form>

<script>
const hammaddeler = [{% for h in hammaddeler %}{"id":{{ h.id }},"ad":"{{ h.ad }}","birim":"{{ h.birim }}"},{% endfor %}];
// Reçete tabanlı ara ürünler (karisim tipi onaylı reçeteler)
const araUrunRecete = [{% for a in ara_urunler %}{"id":"r_{{ a.id }}","ad":"{{ a.ad }} (reçete)"},{% endfor %}];
// Stokta mevcut yarı mamuller
const araUrunStok   = [{% for y in yari_mamuller %}{"id":"y_{{ y.id }}","ad":"{{ y.ad }} — {{ y.kalan_miktar|fmt }} {{ y.birim }} (stok)"},{% endfor %}];
const araUrunler    = [...araUrunRecete, ...araUrunStok];
const birimler    = {{ birimler|tojson }};
let kalemSayisi   = 0;

function araSecildi(sel, i) {
  // r_ prefix = reçete, y_ prefix = yarı mamul
  const val = sel.value;
  const tip = val.startsWith('y_') ? 'yari_mamul' : 'recete';
  const el = document.getElementById('kalem_ara_tip_' + i);
  if (el) el.value = tip;
  // Gerçek ID'yi hidden input'a yaz
  sel.value = val; // r_5 veya y_3 olarak kalacak, backend parse edecek
}

function kalemEkle(){
  const i = kalemSayisi++;
  const div = document.createElement('div');
  div.style = "padding:12px 16px;border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 80px 70px 60px auto;gap:8px;align-items:end";
  div.innerHTML = `
    <div>
      <label style="font-size:11px;color:var(--muted);font-weight:500">Hammadde / Ara Ürün</label>
      <select name="kalem_hammadde_${i}" class="form-select" onchange="this.form.querySelector('[name=kalem_birim_${i}]').value=this.options[this.selectedIndex].dataset.birim||'kg'">
        <option value="">— Hammadde —</option>
        ${hammaddeler.map(h=>`<option value="${h.id}" data-birim="${h.birim}">${h.ad}</option>`).join('')}
      </select>
      ${araUrunler.length ? `<select name="kalem_ara_${i}" class="form-select" style="margin-top:4px" onchange="araSecildi(this,${i})"><option value="">— Ara Ürün / Yarı Mamul —</option><optgroup label="Reçete (Karışım)">${araUrunRecete.map(a=>\`<option value="\${a.id}">\${a.ad}</option>\`).join('')}</optgroup><optgroup label="Stokta Yarı Mamul">${araUrunStok.map(a=>\`<option value="\${a.id}">\${a.ad}</option>\`).join('')}</optgroup></select><input type="hidden" name="kalem_ara_tip_${i}" id="kalem_ara_tip_${i}">` : ''}
    </div>
    <div><label style="font-size:11px;color:var(--muted);font-weight:500">Miktar *</label><input type="number" name="kalem_miktar_${i}" class="form-control" step="0.0001" required></div>
    <div><label style="font-size:11px;color:var(--muted);font-weight:500">Birim</label>
      <select name="kalem_birim_${i}" class="form-select">${birimler.map(b=>`<option value="${b}">${b}</option>`).join('')}</select>
    </div>
    <div><label style="font-size:11px;color:var(--muted);font-weight:500">±%</label><input type="number" name="kalem_tolerans_${i}" class="form-control" value="5" min="0" max="100"></div>
    <button type="button" class="btn-red" onclick="this.parentElement.remove()" style="padding:6px 10px"><i class="bi bi-trash"></i></button>
  `;
  document.getElementById('kalemler').appendChild(div);
}
// İlk kalem otomatik
kalemEkle();
</script>
{% endblock %}
